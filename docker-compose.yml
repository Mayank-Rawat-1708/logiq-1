services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: logiq
      POSTGRES_USER: logiq
      POSTGRES_PASSWORD: logiq
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=2

  flower:
    build: ./backend
    depends_on:
      - redis
    ports:
      - "5556:5555"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A app.workers.tasks flower --port=5555

volumes:
  postgres_data:
